name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install "black>=25,<26" flake8
      - run: black --check icelandic_asr/
      - run: flake8 icelandic_asr/

  test:
    name: Install & smoke-test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install CPU-only PyTorch first (saves ~2 GB vs default CUDA build)
      - name: Install CPU-only PyTorch
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install package
        run: pip install .

      # Verify all imports resolve
      - name: Import check
        run: python -c "from icelandic_asr.server import app, state, IS_MODELS, TURBO_MODEL_ID; print('imports OK')"

      # Start server, verify transcription against reference texts
      - name: Transcription test
        run: |
          # Start server in background (CPU, wav2vec2)
          icelandic-asr --devices cpu --port 9123 &
          SERVER_PID=$!

          # Wait for server to be ready (model download + load)
          echo "Waiting for server..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:9123/v1/status > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Check status endpoint
          echo "=== /v1/status ==="
          curl -sf http://localhost:9123/v1/status | python -m json.tool

          # Check health endpoint
          echo "=== /health ==="
          curl -sf http://localhost:9123/health | python -m json.tool

          # Verify transcriptions against reference texts
          echo "=== Transcription verification ==="
          python tests/verify_transcriptions.py http://localhost:9123

          kill $SERVER_PID 2>/dev/null
        timeout-minutes: 10